name: Infrastructure Drift Detection

on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 7am UTC — before EventBridge rules fire
  workflow_dispatch: {}   # Manual trigger

env:
  AWS_REGION: us-east-2

permissions:
  contents: read
  issues: write  # To create issues on drift detection

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pip install boto3

      - name: Run drift checks
        id: drift
        run: |
          python scripts/drift_check.py --json --exit-code > drift_report.json 2>&1 || echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat drift_report.json

      - name: Terraform plan (drift detection)
        if: always()
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Run terraform plan
        if: always()
        working-directory: infra
        run: |
          terraform init
          terraform plan -detailed-exitcode -no-color 2>&1 | tee tf_plan.txt || true

      - name: Create issue on drift
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT=$(cat drift_report.json 2>/dev/null || echo "No report generated")
          gh issue create \
            --title "Infrastructure drift detected ($(date -u +%Y-%m-%d))" \
            --body "$(cat <<EOF
          ## Drift Detection Report

          **Triggered:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ### Drift check output

          \`\`\`json
          $(head -c 3000 drift_report.json 2>/dev/null || echo "No report")
          \`\`\`

          ### Terraform plan

          \`\`\`
          $(tail -20 infra/tf_plan.txt 2>/dev/null || echo "No plan output")
          \`\`\`

          ---
          *Auto-generated by drift detection workflow*
          EOF
          )" \
            --label "infrastructure"
